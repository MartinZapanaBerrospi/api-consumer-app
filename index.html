<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéAPI Explorer - Martín Zapana</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>PokéAPI Explorer</h1>
            <p>Buscador de Pokémon en tiempo real consumiendo <a href="https://pokeapi.co/" target="_blank">PokéAPI</a></p>
        </header>

        <main>
            <div class="search-container">
                <input type="text" id="pokemon-input" placeholder="Ingresa un nombre o número (Ej. Pikachu o 25)">
                <button id="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Buscar
                </button>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader hidden"></div>

            <!-- Error message -->
            <div id="error-message" class="error-message hidden">
                <p>No se encontró el Pokémon. Verifica el nombre o número e intenta de nuevo.</p>
            </div>

            <!-- Results container -->
            <div id="pokemon-card" class="pokemon-card hidden">
                <div class="card-header">
                    <span id="pokemon-id" class="pokemon-id">#000</span>
                    <h2 id="pokemon-name" class="pokemon-name">Nombre</h2>
                </div>
                
                <div class="pokemon-image-container">
                    <img id="pokemon-image" src="" alt="Pokemon Image">
                </div>
                
                <div class="pokemon-types" id="pokemon-types">
                    <!-- Tipos inyectados via JS -->
                </div>
                
                <div class="pokemon-stats">
                    <div class="stat-row">
                        <span class="stat-name">HP</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar" id="stat-hp"></div>
                        </div>
                        <span class="stat-val" id="val-hp">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">Ataque</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar" id="stat-attack"></div>
                        </div>
                        <span class="stat-val" id="val-attack">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">Defensa</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar" id="stat-defense"></div>
                        </div>
                        <span class="stat-val" id="val-defense">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">Velocidad</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar" id="stat-speed"></div>
                        </div>
                        <span class="stat-val" id="val-speed">0</span>
                    </div>
                </div>

                <div class="pokemon-info">
                    <div class="info-item">
                        <span class="info-label">Altura</span>
                        <span class="info-value" id="pokemon-height">0 m</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Peso</span>
                        <span class="info-value" id="pokemon-weight">0 kg</span>
                    </div>
                </div>
            </div>
            
        </main>

        <footer>
            <a href="https://github.com/martinzapanaberrospi" target="_blank" class="github-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                Ver más proyectos
            </a>
        </footer>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
